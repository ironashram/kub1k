name: Cleanup PR Plan

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    paths:
      - "terraform/**"
      - "terraform/**/*.yaml"

jobs:
  cleanup:
    runs-on: gha-runner-scale-set-kub1k
    container:
      image: ghcr.io/ironashram/toolbox:latest
    defaults:
      run:
        shell: bash
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
      S3_BUCKET: github-artifacts
    steps:
      - name: Delete this PR's plan (closed without merge)
        if: github.event.pull_request.merged == false
        run: |
          aws s3 rm --recursive \
            "s3://${S3_BUCKET}/${{ github.event.repository.name }}/pulls/${{ github.event.number }}/"

      - name: Sweep plans older than 7 days
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY##*/}"
          cutoff=$(python3 -c 'import datetime; print((datetime.datetime.now() - datetime.timedelta(days=7)).strftime("%Y-%m-%d %H:%M:%S"))')
          set +e
          listing=$(aws s3 ls "s3://${S3_BUCKET}/${repo}/pulls/" --recursive)
          rc=$?
          set -e
          [ "$rc" -le 1 ] || exit "$rc"
          while read -r d t _ key; do
            [ -n "$key" ] || continue
            [[ "$d $t" < "$cutoff" ]] || continue
            echo "Removing stale $key"
            aws s3 rm "s3://${S3_BUCKET}/${key}"
          done <<<"$listing"
