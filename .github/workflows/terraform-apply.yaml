name: Terraform Apply

on:
  pull_request:
    types: [closed]
    paths:
      - 'terraform/**'
      - 'terraform/**/*.yaml'

concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.merged == true
    runs-on: [self-hosted, kub1k]
    container:
      image: ghcr.io/ironashram/toolbox:latest
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up ssh key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
          eval $(ssh-agent)
          ssh-add -q ~/.ssh/id_rsa
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Download plan artifact
        run: |
          if aws s3api head-object --bucket "$S3_BUCKET" --key "$S3_PREFIX/terraform.tfplan" >/dev/null 2>&1; then
            aws s3 cp "s3://${S3_BUCKET}/${S3_PREFIX}/terraform.tfplan" terraform/terraform.tfplan
            echo present > .plan-state
          else
            echo "No saved plan for this PR (plan had no changes); skipping apply."
            echo absent > .plan-state
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL:  ${{ secrets.AWS_ENDPOINT_URL }}
          S3_BUCKET: github-artifacts
          S3_PREFIX: ${{ github.event.repository.name }}/pulls/${{ github.event.number }}/terraform-plan

      - name: terraform apply
        run: |
          [ "$(cat .plan-state)" = "present" ] || exit 0
          make apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
          TF_VAR_remote_state_s3_endpoint: ${{ secrets.TF_VAR_REMOTE_STATE_S3_ENDPOINT }}

      - name: Delete plan from S3
        if: success()
        run: |
          [ "$(cat .plan-state)" = "present" ] || exit 0
          aws s3 rm --recursive "s3://${S3_BUCKET}/${{ github.event.repository.name }}/pulls/${{ github.event.number }}/"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          S3_BUCKET: github-artifacts
