name: "ArgoCD App Updates"

on:
  schedule:
    - cron: '0 6 * * 6'
  workflow_dispatch:

jobs:

  update:
    runs-on: ubuntu-latest
    permissions:
        contents: write
        pull-requests: write
    steps:

      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: '0'

      - name: Check updates for ArgoCD Apps
        uses: ironashram/argocd-apps-action@4508cc9a2f607c464986c5a6fcbc2a63fa238fa9 # v2.0.1
        with:
          skip_prerelease: true
          target_branch: main
          create_pr: true
          apps_folder: apps/templates
        env:
          GITHUB_TOKEN: ${{ secrets.ACTION_TOKEN }}
