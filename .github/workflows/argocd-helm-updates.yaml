name: "ArgoCD App Updates"

on:
  schedule:
    - cron: '0 6 * * 6'
  workflow_dispatch:

jobs:

  update:
    runs-on: ubuntu-latest
    permissions:
        contents: write
        pull-requests: write
    steps:

      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: '0'

      - name: Check updates for ArgoCD Apps
        uses: ironashram/argocd-apps-action@2cc972eec450510c92bedce6d264fc305d5e9d54 # v2.1.0
        with:
          skip_prerelease: true
          target_branch: main
          create_pr: true
          apps_folder: apps/templates
          allow_regex_fallback: true
        env:
          GITHUB_TOKEN: ${{ secrets.ACTION_TOKEN }}
