name: "Terraform Helm Updates"

on:
  schedule:
    - cron: '0 6 * * 6'
  workflow_dispatch:

jobs:

  update:
    runs-on: ubuntu-latest
    permissions:
        contents: write
        pull-requests: write
    steps:

      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: '0'

      - name: Check updates for Terraform Managed Helm Charts
        uses: ironashram/argocd-apps-action@56274b82d5397c88b2f0e84ef480b3ef71d1fe68 # v1.7.1
        with:
          skip_prerelease: true
          target_branch: main
          create_pr: true
          apps_folder: terraform/modules/apps/manifests
        env:
          GITHUB_TOKEN: ${{ secrets.ACTION_TOKEN }}
