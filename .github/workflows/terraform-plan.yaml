name: Terraform Plan

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "terraform/**"
      - "terraform/**/*.yaml"

concurrency:
  group: terraform-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: gha-runner-scale-set-kub1k
    container:
      image: ghcr.io/ironashram/toolbox:latest
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up ssh key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
          eval $(ssh-agent)
          ssh-add -q ~/.ssh/id_rsa
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: terraform plan
        run: |
          set +e
          make plan-custom OPTIONS=-detailed-exitcode
          rc=$?
          set -e
          if [ "$rc" -eq 1 ]; then exit 1; fi
          if [ "$rc" -eq 2 ]; then echo changes > terraform/.plan-result; else echo none > terraform/.plan-result; fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
          TF_VAR_remote_state_s3_endpoint: ${{ secrets.TF_VAR_REMOTE_STATE_S3_ENDPOINT }}

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        run: make comment-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload plan artifact
        if: github.event_name == 'pull_request'
        run: |
          if [ "$(cat terraform/.plan-result)" = "changes" ]; then
            aws s3 cp terraform/terraform.tfplan "s3://${S3_BUCKET}/${S3_PREFIX}/terraform.tfplan"
          else
            echo "Plan has no changes; removing any previously uploaded plan so apply is skipped on merge."
            aws s3 rm "s3://${S3_BUCKET}/${S3_PREFIX}/terraform.tfplan"
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          S3_BUCKET: github-artifacts
          S3_PREFIX: ${{ github.event.repository.name }}/pulls/${{ github.event.number }}/terraform-plan
