redis:
  enabled: true
  metrics:
    enabled: false
redis-ha:
  enabled: false
redisSecretInit:
  enabled: true
dex:
  enabled: false
notifications:
  enabled: false
configs:
  params:
    server.insecure: true
controller:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  podLabels:
    kub1k.io/workload-heavy: "true"
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      nodeTaintsPolicy: Honor
      nodeAffinityPolicy: Honor
      labelSelector:
        matchLabels:
          kub1k.io/workload-heavy: "true"
repoServer:
  replicas: 1
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
server:
  replicas: 1
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  ingress:
    enabled: true
    ingressClassName: haproxy
    tls: true
  certificate:
    enabled: true
    issuer:
      group: cert-manager.io
      kind: ClusterIssuer
      name: letsencrypt-prod
