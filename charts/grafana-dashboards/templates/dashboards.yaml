{{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
{{- $name := trimSuffix ".json" (base $path) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-{{ $name }}
  labels:
    grafana_dashboard: "1"
data:
  {{ base $path }}: |-
{{ $.Files.Get $path | indent 4 }}
{{- end }}
