---
replicaCount: 1

image:
  repository: nginx
  tag: 1.28.2-alpine
  pullPolicy: IfNotPresent

sync:
  method: rsync

rsync:
  image:
    repository: ghcr.io/ironashram/toolbox
    tag: latest
  upstream: rsync://test.example.com/cachyos/
  schedule: "*/30 * * * *"

syncthing:
  image:
    repository: syncthing/syncthing
    tag: "1.29"
  folderID: ""
  globalAnnounce: true
  relaysEnabled: true

storage:
  size: 250Gi
  storageClass: ""
  accessMode: ReadWriteOnce
  excludeFromBackup: false

service:
  port: 80

ingress:
  enabled: true
  className: haproxy
  host: ""
  tls:
    enabled: true
    secretName: cachyos-mirror-cert
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod

extraIngresses: []

nodeSelector: {}

resources:
  nginx:
    requests:
      cpu: 50m
      memory: 64Mi
  rsync:
    requests:
      cpu: 100m
      memory: 128Mi
  syncthing:
    requests:
      cpu: 200m
      memory: 256Mi

lagExporter:
  mirrorDomain: ""
  pushgatewayUrl: "http://prometheus-pushgateway.monitoring:9091"
