apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      {{- if .Values.storage.excludeFromBackup }}
      annotations:
        backup.velero.io/backup-volumes-excludes: mirror-data
      {{- end }}
      labels:
        app: {{ .Release.Name }}
    spec:
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        {{- if eq .Values.sync.method "syncthing" }}
        fsGroup: 1000
        {{- else }}
        runAsUser: 101
        fsGroup: 101
        {{- end }}
        seccompProfile:
          type: RuntimeDefault
      {{- if eq .Values.sync.method "syncthing" }}
      initContainers:
        - name: syncthing-init
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              if [ ! -f /config/config.xml ]; then
                cp /config-seed/config.xml /config/config.xml
                cp /certs/cert.pem /config/cert.pem
                cp /certs/key.pem /config/key.pem
              fi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: syncthing-config
              mountPath: /config
            - name: syncthing-config-seed
              mountPath: /config-seed
            - name: syncthing-certs
              mountPath: /certs
      {{- end }}
      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
          securityContext:
            {{- if eq .Values.sync.method "syncthing" }}
            runAsUser: 101
            runAsGroup: 101
            {{- end }}
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          volumeMounts:
            - name: mirror-data
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources.nginx | nindent 12 }}
        {{- if eq .Values.sync.method "syncthing" }}
        - name: syncthing
          image: "{{ .Values.syncthing.image.repository }}:{{ .Values.syncthing.image.tag }}"
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: STGUIADDRESS
              value: ""
            - name: STNOUPGRADE
              value: "1"
          volumeMounts:
            - name: mirror-data
              mountPath: /var/syncthing/data
            - name: syncthing-config
              mountPath: /var/syncthing/config
          resources:
            {{- toYaml .Values.resources.syncthing | nindent 12 }}
        {{- end }}
      volumes:
        - name: mirror-data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
        - name: nginx-conf
          configMap:
            name: {{ .Release.Name }}-nginx-conf
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        {{- if eq .Values.sync.method "syncthing" }}
        - name: syncthing-config
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-syncthing-config
        - name: syncthing-config-seed
          configMap:
            name: {{ .Release.Name }}-syncthing-config
        - name: syncthing-certs
          secret:
            secretName: {{ .Release.Name }}-syncthing-certs
        {{- end }}
