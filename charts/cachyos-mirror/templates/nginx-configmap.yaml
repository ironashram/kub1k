apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-nginx-conf
  namespace: {{ .Release.Namespace }}
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        server_tokens off;

        root /usr/share/nginx/html;

        location / {
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
            index off;
        }

        {{- if eq .Values.sync.method "syncthing" }}
        location ~ /\.(stfolder|stversions|syncthing) {
            deny all;
            return 404;
        }
        {{- else }}
        location ~ /\.rsync-partial {
            deny all;
            return 404;
        }
        {{- end }}
    }
