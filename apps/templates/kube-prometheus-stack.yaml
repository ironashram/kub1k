apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  labels:
    app/cluster: "{{ .Values.environment }}"
    app/source: upstream
spec:
  project: default
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 84.5.0
    helm:
      valuesObject:
        kubernetesServiceMonitors:
          enabled: true
        defaultRules:
          rules:
            alertmanager: true
          disabled:
            Watchdog: true
            InfoInhibitor: true
        customRules:
          etcdMemberCommunicationSlow:
            for: 1h
          NodeSystemSaturation:
            for: 1h
        alertmanager:
          alertmanagerSpec:
            replicas: 2
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: alertmanager
                    topologyKey: kubernetes.io/hostname
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: synology-csi-iscsi-custom
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 2Gi
          config:
            route:
              group_by: ['namespace']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: matrix
              routes:
                - matchers:
                    - alertname="TargetDown"
                    - job="workstations-node"
                  receiver: 'null'
            receivers:
              - name: matrix
                webhook_configs:
                  - url: "https://matrix-alertmanager-receiver.{{ .Values.externalDomain }}/alerts/k8s-alerts"
              - name: 'null'
          ingress:
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            enabled: true
            ingressClassName: haproxy
            hosts:
              - alertmanager.{{ .Values.internalDomain }}
            tls:
              - secretName: alertmanager-cert
                hosts:
                  - alertmanager.{{ .Values.internalDomain }}
        grafana:
          persistence:
            enabled: true
            type: sts
            storageClassName: synology-csi-iscsi-custom
            accessModes:
              - ReadWriteOnce
            size: 2Gi
            finalizers:
              - kubernetes.io/pvc-protection
          admin:
            existingSecret: grafana-admin
            userKey: admin-user
            passwordKey: admin-password
          ingress:
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            enabled: true
            ingressClassName: haproxy
            hosts:
              - grafana.{{ .Values.internalDomain }}
            tls:
              - secretName: grafana-cert
                hosts:
                  - grafana.{{ .Values.internalDomain }}
          serviceMonitor:
            labels:
              release: kube-prometheus-stack
          sidecar:
            datasources:
              url: https://vm.{{ .Values.internalDomain }}
              extraJsonData:
                prometheusType: VictoriaMetrics
        prometheus:
          ingress:
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            enabled: true
            ingressClassName: haproxy
            hosts:
              - prometheus.{{ .Values.internalDomain }}
            tls:
              - secretName: prometheus-cert
                hosts:
                  - prometheus.{{ .Values.internalDomain }}
          prometheusSpec:
            replicas: 2
            replicaExternalLabelNameClear: true
            externalLabels:
              cluster: "{{ .Values.environment }}"
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: prometheus
                    topologyKey: kubernetes.io/hostname
            podMetadata:
              labels:
                kub1k.io/workload-heavy: "true"
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: DoNotSchedule
                nodeTaintsPolicy: Honor
                nodeAffinityPolicy: Honor
                labelSelector:
                  matchLabels:
                    kub1k.io/workload-heavy: "true"
            remoteWrite:
              - url: https://vm-a.{{ .Values.internalDomain }}/api/v1/write
                queueConfig:
                  capacity: 10000
                  maxShards: 30
                  minShards: 1
                  maxSamplesPerSend: 3000
                  batchSendDeadline: 5s
                  minBackoff: 30ms
                  maxBackoff: 5s
              - url: https://vm-b.{{ .Values.internalDomain }}/api/v1/write
                queueConfig:
                  capacity: 10000
                  maxShards: 30
                  minShards: 1
                  maxSamplesPerSend: 3000
                  batchSendDeadline: 5s
                  minBackoff: 30ms
                  maxBackoff: 5s
            serviceMonitorSelectorNilUsesHelmValues: false
            serviceMonitorNamespaceSelector:
              matchExpressions:
                - key: kubernetes.io/metadata.name
                  operator: Exists
            retention: 2h
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: synology-csi-iscsi-custom
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
            nodeSelector:
              node-role.kubernetes.io/worker: "true"
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
              runAsGroup: 0
              fsGroup: 0
            containers:
              - name: prometheus
                env:
                  - name: GOMEMLIMIT
                    value: "1300MiB"
            additionalScrapeConfigs:
              - job_name: 'kube-etcd'
                scheme: http
                static_configs:
                  - targets:
                    {{- range .Values.k8sControlNodes }}
                    - '{{ . }}:2381'
                    {{- end }}
                metric_relabel_configs:
                  - source_labels: [__name__]
                    regex: (etcd|grpc|rest_client|process|go)_(.+)
                    action: keep
                relabel_configs:
                  - source_labels: []
                    target_label: endpoint
                    replacement: http-metrics
                  - source_labels: []
                    target_label: service
                    replacement: kube-prometheus-stack-kube-etcd
                  - source_labels: []
                    target_label: namespace
                    replacement: kube-system
              - job_name: 'kube-controller-manager'
                scheme: https
                static_configs:
                  - targets:
                    {{- range .Values.k8sControlNodes }}
                    - '{{ . }}:10257'
                    {{- end }}
                tls_config:
                  insecure_skip_verify: true
                bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                metric_relabel_configs:
                  - source_labels: [__name__]
                    regex: (workqueue|rest_client|process|go)_(.+)
                    action: keep
                relabel_configs:
                  - source_labels: []
                    target_label: endpoint
                    replacement: https-metrics
                  - source_labels: []
                    target_label: service
                    replacement: kube-prometheus-stack-kube-controller-manager
                  - source_labels: []
                    target_label: namespace
                    replacement: kube-system
              - job_name: 'kube-scheduler'
                scheme: https
                static_configs:
                  - targets:
                    {{- range .Values.k8sControlNodes }}
                    - '{{ . }}:10259'
                    {{- end }}
                tls_config:
                  insecure_skip_verify: true
                bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                metric_relabel_configs:
                  - source_labels: [__name__]
                    regex: (scheduler|rest_client|process|go)_(.+)
                    action: keep
                relabel_configs:
                  - source_labels: []
                    target_label: endpoint
                    replacement: https-metrics
                  - source_labels: []
                    target_label: service
                    replacement: kube-prometheus-stack-kube-scheduler
                  - source_labels: []
                    target_label: namespace
                    replacement: kube-system
              - job_name: 'workstations-node'
                static_configs:
                  - targets:
                    - 'ashram.{{ .Values.externalDomain }}:9100'
                    labels:
                      instance: ashram
                  - targets:
                    - 'amarok.{{ .Values.externalDomain }}:9100'
                    labels:
                      instance: amarok
                  - targets:
                    - 'nargaroth.{{ .Values.externalDomain }}:9100'
                    labels:
                      instance: nargaroth
              - job_name: 'commstack-node'
                static_configs:
                  - targets:
                    - 'matrix.{{ .Values.externalDomain }}:9100'
                    labels:
                      instance: commstack
              - job_name: 'commstack-cadvisor'
                static_configs:
                  - targets:
                    - 'matrix.{{ .Values.externalDomain }}:8080'
                    labels:
                      instance: commstack
              - job_name: 'commstack-haproxy'
                static_configs:
                  - targets:
                    - 'matrix.{{ .Values.externalDomain }}:8405'
                    labels:
                      instance: commstack
              - job_name: 'commstack-synapse'
                metrics_path: '/_synapse/metrics'
                static_configs:
                  - targets:
                    - 'matrix.{{ .Values.externalDomain }}:9000'
                    labels:
                      instance: commstack
        prometheusOperator:
          tls:
            enabled: false
          admissionWebhooks:
            enabled: false
            failurePolicy: Ignore
        kubeApiServer:
          serviceMonitor:
            metricRelabelings:
              - sourceLabels: ["__name__"]
                regex: "(apiserver|workqueue|rest_client|process|go)_(.+)"
                action: keep
        kubelet:
          serviceMonitor:
            metricRelabelings:
              - sourceLabels: ["__name__"]
                regex: "(kubelet|storage|rest_client|process|go)_(.+)"
                action: keep
        kubeEtcd:
          service:
            enabled: false
          serviceMonitor:
            enabled: false
        kubeControllerManager:
          service:
            enabled: false
          serviceMonitor:
            enabled: false
        kubeScheduler:
          service:
            enabled: false
          serviceMonitor:
            enabled: false
        kubeProxy:
          enabled: false
        coreDns:
          enabled: true
          service:
            enabled: false
          serviceMonitor:
            enabled: false
        additionalPrometheusRulesMap:
          cachyos-mirror:
            groups:
            - name: cachyos-mirror
              rules:
                - alert: CachyOSMirrorLagHigh
                  annotations:
                    message: CachyOS mirror lag is {{`{{`}} $value | humanizeDuration {{`}}`}}
                  expr: cachyos_mirror_lag_seconds > 43200
                  for: 1h
                  labels:
                    severity: warning
                - alert: CachyOSMirrorLagUnknown
                  annotations:
                    message: CachyOS mirror lag check is failing (metric absent or -1)
                  expr: cachyos_mirror_lag_seconds < 0 or absent(cachyos_mirror_lag_seconds)
                  for: 30m
                  labels:
                    severity: warning
          veeam:
            groups:
            - name: veeam
              rules:
                - alert: VeeamBackupFailed
                  annotations:
                    message: Veeam backup {{`{{`}} $labels.job_name {{`}}`}} on {{`{{`}} $labels.instance {{`}}`}} last run failed
                  expr: |-
                    veeam_backup_last_status == 0
                  for: 1h
                  labels:
                    severity: warning
                - alert: VeeamNoRecentBackup
                  annotations:
                    message: Veeam backup {{`{{`}} $labels.job_name {{`}}`}} on {{`{{`}} $labels.instance {{`}}`}} has not succeeded in the last 48h
                  expr: |-
                    (
                    (time() - veeam_backup_last_successful_timestamp_seconds) > bool (48 * 3600)
                    or
                    absent(veeam_backup_last_successful_timestamp_seconds)
                    ) == 1
                  for: 1h
                  labels:
                    severity: critical
                - alert: VeeamRepositoryUnreachable
                  annotations:
                    message: Veeam repository {{`{{`}} $labels.repository {{`}}`}} is unreachable from {{`{{`}} $labels.instance {{`}}`}}
                  expr: |-
                    veeam_repository_accessible == 0
                  for: 1h
                  labels:
                    severity: critical
                - alert: VeeamExporterStale
                  annotations:
                    message: Veeam textfile collector on {{`{{`}} $labels.instance {{`}}`}} has not updated in over 30m
                  expr: |-
                    time() - veeam_exporter_last_run_timestamp_seconds > 1800
                  for: 1h
                  labels:
                    severity: warning
  ignoreDifferences:
    - group: "apps"
      kind: "Deployment"
      jqPathExpressions:
        - .spec.template.spec.containers[].resources
        - .spec.template.spec.initContainers[].resources
    - group: "apps"
      kind: "DaemonSet"
      jqPathExpressions:
        - .spec.template.spec.containers[].resources
    - group: "apps"
      kind: "StatefulSet"
      jqPathExpressions:
        - .spec.volumeClaimTemplates[]
  destination:
    name: in-cluster
    namespace: monitoring
